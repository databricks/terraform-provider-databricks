name: Provider schema (classify)

# Producer half of the breaking-schema check. This workflow builds the provider
# on base and head, diffs the schemas, runs the classifier, and uploads the
# result as a workflow artifact. It is purely informational — it never gates
# the PR directly. The companion workflow `schema-status.yml` owns the
# `breaking-schema-check` commit status (the actual required check) and is
# where the bypass directive in the PR description is honored.
#
# The split exists because the classifier needs to BUILD head code (which can't
# safely run under `pull_request_target` for fork PRs), while the comment /
# status step needs `gh` API access AND the ability to re-fire on body edits
# (both of which require `pull_request_target` on a protected runner).

on:
  pull_request:
    types: [opened, synchronize]

  workflow_dispatch:
    inputs:
      base:
        description: "Base ref"
        default: "main"
        required: true
      head:
        description: "Head ref"
        default: "main"
        required: true

permissions:
  contents: read

jobs:
  classify:
    runs-on: ubuntu-latest

    steps:
      # Check out the base commit first and the head commit second. diff-schema
      # uses the current commit as the head commit.
      - if: github.event_name == 'pull_request'
        name: Checkout PR base commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.base_ref }}
      - if: github.event_name == 'pull_request'
        name: Checkout PR merge commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - if: github.event_name == 'workflow_dispatch'
        name: Checkout base commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.base }}
      - if: github.event_name == 'workflow_dispatch'
        name: Checkout head commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.head }}

      - name: "Setup Go"
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 # v2.0.3
        with:
          terraform_wrapper: false

      - name: "Install jd"
        run: go install github.com/josephburnett/jd@11eae3c9ffb1dd32796ca741691bf4733a27dfa4 # v1.8.1

      - name: Run schema diff and breaking-change classifier
        id: classify
        continue-on-error: true
        env:
          BASE_COMMIT: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.inputs.base }}
          CLASSIFIER_REPORT: /tmp/classifier-report.md
        run: make diff-schema

      # Write the step outcome to a marker file so the downstream status
      # workflow (which runs under pull_request_target and can't read this
      # workflow's job outputs directly) can pick it up from the artifact.
      - name: Write outcome marker
        run: |
          echo "${{ steps.classify.outcome }}" > /tmp/classifier-outcome.txt
          cat /tmp/classifier-outcome.txt

      - name: Upload classifier artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: classifier-output
          path: |
            /tmp/classifier-report.md
            /tmp/classifier-outcome.txt
          if-no-files-found: warn
          retention-days: 3
