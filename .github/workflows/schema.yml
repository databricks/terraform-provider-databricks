name: Provider schema

on:
  pull_request:
    types: [opened, synchronize]

  workflow_dispatch:
    inputs:
      base:
        description: "Base ref"
        default: "main"
        required: true
      head:
        description: "Head ref"
        default: "main"
        required: true

permissions:
  contents: read

jobs:
  breaking-schema-check:
    runs-on: ubuntu-latest

    steps:
      # Check out the base commit first and the head commit second. diff-schema
      # uses the current commit as the head commit.
      - if: github.event_name == 'pull_request'
        name: Checkout PR base commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.base_ref }}
      - if: github.event_name == 'pull_request'
        name: Checkout PR merge commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - if: github.event_name == 'workflow_dispatch'
        name: Checkout base commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.base }}
      - if: github.event_name == 'workflow_dispatch'
        name: Checkout head commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.head }}

      - name: "Setup Go"
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 # v2.0.3
        with:
          terraform_wrapper: false

      - name: "Install jd"
        run: go install github.com/josephburnett/jd@11eae3c9ffb1dd32796ca741691bf4733a27dfa4 # v1.8.1

      # Read the PR description for the bypass directive directly from the event
      # payload — no `gh` API call needed, which means this step works on the
      # default `ubuntu-latest` runner (the org's IP allow list would block API
      # calls from those runners). Trade-off: editing the PR body after-the-fact
      # only takes effect on the next `synchronize` event (i.e., push a new
      # commit). Sanitization mirrors the precedent in `.github/workflows/next-changelog.yml`.
      - name: Check PR description for bypass directive
        if: github.event_name == 'pull_request'
        id: bypass
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          sanitized=$(printf '%s' "${PR_BODY}" | sed 's/[^a-zA-Z0-9._=/-]/_/g')
          if printf '%s' "${sanitized}" | grep -q 'ALLOW_SCHEMA_BREAKING_CHANGE=true'; then
            echo "allow=true" >> "$GITHUB_OUTPUT"
          else
            echo "allow=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run schema diff and breaking-change classifier
        id: classify
        continue-on-error: true
        env:
          BASE_COMMIT: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.inputs.base }}
        run: make diff-schema

      - name: Fail on breaking changes
        if: steps.classify.outcome != 'success' && steps.bypass.outputs.allow != 'true'
        run: |
          echo "Breaking schema changes detected. See the classifier report in the previous step's logs."
          echo
          echo "If the break is intentional, add this line anywhere in the PR description:"
          echo
          echo "    ALLOW_SCHEMA_BREAKING_CHANGE=true"
          echo
          echo "...then push a new commit to re-trigger the workflow. (Editing the description alone won't pick up the directive — the workflow reads the body from the synchronize event payload.)"
          echo
          echo "Note: ForceNew flips are NOT detected by this classifier (the Terraform schema dump doesn't expose ForceNew). Please review such changes manually."
          exit 1
