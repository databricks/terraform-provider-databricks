# Regression-guard: a v1.113.0 -> v1.114.0 -> v1.113.0 downgrade should NOT
# destructively replace databricks_token. Same root cause as issue #5678
# (state pollution by v1.114.0's post-Read hook + schema mismatch on the
# rolled-back binary's auto-ForceNew sweep), observed at the downgrade
# direction (v1.114.0 -> v1.113.0) instead of #5678's forward direction
# (v1.114.0 -> v1.114.1).
#
# Step 3 asserts the destructive replacement via v6.3 plan-content matchers
# (expect_non_empty_plan + plan_match 'must be replaced'). Step 4 remains
# a comment-only manual check: the on-main fix can produce either an
# empty plan or an in-place update, and the framework currently has no
# negative matcher to express "must NOT contain forces replacement".
#
# Step 3 is plan-only for safety: applying v1.113.0 against the polluted
# state would silently DESTROY the real token and recreate it. Test
# infrastructure should not silently destroy real cloud resources.
#
# Step 4 proves the on-main fix (commit 115199fc) resolves the destructive
# intent: the local build skips provider_config in the auto-ForceNew sweep
# and synthesizes a no-op Update for resources with provider_config +
# Create/Delete (no Update method).

name: rollback_err_token_v1_113_v1_114_v1_113
profile: WORKSPACE_AWS
cleanup: true
requires:
  cloud: any
  level: workspace

steps:
  - name: create_on_1_113_0
    version: "1.113.0"
    command: apply
    expect: success

  - name: refresh_pollutes_state_on_1_114_0
    version: "1.114.0"
    command: apply
    expect: success

  - name: rollback_to_1_113_0_force_replaces
    version: "1.113.0"
    command: plan
    expect: success
    expect_non_empty_plan: true
    plan_match: 'must be replaced'

  - name: fixed_on_local
    version: "local"
    command: plan
    expect: success
    # Manual verification: open step_4_*.stdout.log and confirm NO
    # "# forces replacement" annotation. Either in-place update
    # ("Plan: 0 to add, 1 to change, 0 to destroy") OR "No changes"
    # is acceptable — both indicate the on-main fix at 115199fc
    # successfully avoids the destructive replacement. The auto-
    # forced-replacement is the bug; everything else is a fix.
