name: force-hc-install-bump

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  bump:
    # Fork PRs get a read-only token and cannot push back — skip them.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go-build-environment
        with:
          go-version-file: go.mod

      - name: Force github.com/hashicorp/hc-install to v0.9.4
        shell: bash
        run: |
          # Route go commands through JFrog (db-golang). v0.9.4 must be
          # allowlisted in the mirror for this to resolve.
          jf go get github.com/hashicorp/hc-install@v0.9.4
          jf go mod tidy

      - name: Remove this workflow
        shell: bash
        run: rm .github/workflows/force-hc-install-bump.yml

      - name: Commit and push
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          git rm .github/workflows/force-hc-install-bump.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Force github.com/hashicorp/hc-install to v0.9.4"
          git push
