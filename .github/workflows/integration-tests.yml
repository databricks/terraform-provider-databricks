name: Integration Tests

on:

  pull_request:
    types: [opened, synchronize]
    branches: [main]

  merge_group:


jobs:
  check-token:
    name: Check secrets access

    runs-on:
      group: databricks-deco-testing-runner-group
      labels: ubuntu-latest-deco

    environment: "test-trigger-is"
    outputs:
      has_token: ${{ steps.set-token-status.outputs.has_token }}
    steps:
      - name: Check if required secrets are set
        id: set-token-status
        run: |
            if [ -z "${{ secrets.DECO_WORKFLOW_TRIGGER_APP_ID }}" ] || [ -z "${{ secrets.DECO_TEST_APPROVAL_APP_ID }}" ]; then
              echo "Required secrets are missing. User has no access to secrets."
              echo "has_token=false" >> $GITHUB_OUTPUT
            else
              echo "All required secrets are set. User has access to secrets."
              echo "has_token=true" >> $GITHUB_OUTPUT
            fi

  # Classify the PR diff. `inert_only` is 'true' iff every changed file is in
  # the inert allowlist (docs, root *.md, issue templates, dependabot.yml,
  # CODEOWNERS, LICENSE); in that case we skip the long integration-test
  # dispatch in favor of posting a synthetic success check.
  detect-changes:
    name: Detect inert-only changes
    if: github.event_name == 'pull_request'

    runs-on:
      group: databricks-deco-testing-runner-group
      labels: ubuntu-latest-deco

    outputs:
      # paths-filter v3.0.2 doesn't support predicate-quantifier: 'every',
      # so the filter computes "any non-inert file changed" and we invert
      # here to expose the positive form the consumers want.
      inert_only: ${{ steps.filter.outputs.non_inert == 'false' }}

    steps:
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            non_inert:
              - '**'
              - '!docs/**'
              - '!*.md'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'
              - '!.github/dependabot.yml'
              - '!CODEOWNERS'
              - '!LICENSE'

  # For PRs that contain code (inert_only == 'false'), a follow-up push that
  # only touches inert paths (e.g. a NEXT_CHANGELOG.md bump after the code
  # already passed) does not invalidate the previous test result. Carry the
  # success forward instead of re-running the 75-minute suite, but ONLY when
  # ALL of the following hold (each gate closes a known attack):
  #   1. The event is a `synchronize` push whose incremental diff
  #      (before...after) touches inert paths only.
  #   2. The push is fast-forward: compare status is 'ahead'. A force-push or
  #      rebase ('diverged'/'behind') never carries forward.
  #   3. The "Integration Tests" check on the PREVIOUS head (`before`) is
  #      completed with conclusion success. Stacking docs on top of failing
  #      or unrun code therefore never mints a green check.
  #   4. The PR targets main (trigger-level branches filter + base.ref guard).
  # Any error or ambiguity (>=300 files in the compare, empty diff, rename
  # from a non-inert path) falls through to carried=false and the full suite
  # runs. Fail-open to running tests, never to skipping them.
  carry-forward:
    name: Carry forward prior Integration Tests success

    runs-on:
      group: databricks-deco-testing-runner-group
      labels: ubuntu-latest-deco

    needs: [check-token, detect-changes]
    if: github.event_name == 'pull_request'
        && needs.check-token.outputs.has_token == 'true'
        && needs.detect-changes.outputs.inert_only == 'false'
        && github.event.pull_request.base.ref == 'main'

    permissions:
      checks: write
      contents: read

    outputs:
      carried: ${{ steps.carry.outputs.carried }}

    steps:
      - name: Evaluate and carry forward
        id: carry
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fail = (reason) => {
              core.info(`No carry-forward: ${reason}`);
              core.setOutput('carried', 'false');
            };
            try {
              if (context.payload.action !== 'synchronize') {
                return fail('not a synchronize push');
              }
              const before = context.payload.before;
              const after = context.payload.after;
              if (!before || !after) {
                return fail('missing before/after SHAs in payload');
              }

              const cmp = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${before}...${after}`,
                per_page: 300,
              });
              if (cmp.data.status !== 'ahead') {
                return fail(`compare status is '${cmp.data.status}' (force-push or rebase)`);
              }
              const files = cmp.data.files ?? [];
              if (files.length === 0) {
                return fail('empty incremental diff');
              }
              if (files.length >= 300) {
                return fail('too many files in incremental diff to classify confidently');
              }

              // Keep in sync with the paths-filter allowlist in detect-changes.
              const INERT = [
                /^docs\//,
                /^[^\/]+\.md$/,
                /^\.github\/ISSUE_TEMPLATE\//,
                /^\.github\/PULL_REQUEST_TEMPLATE\.md$/,
                /^\.github\/dependabot\.yml$/,
                /^CODEOWNERS$/,
                /^LICENSE$/,
              ];
              const isInert = (p) => INERT.some((re) => re.test(p));
              for (const f of files) {
                const paths = [f.filename, f.previous_filename].filter(Boolean);
                if (!paths.every(isInert)) {
                  return fail(`non-inert path in pushed commits: ${f.filename}`);
                }
              }

              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: before,
                check_name: 'Integration Tests',
                filter: 'latest',
                per_page: 50,
              });
              const green = checks.data.check_runs.some(
                (c) => c.status === 'completed' && c.conclusion === 'success'
              );
              if (!green) {
                return fail('Integration Tests is not successful on the previous head');
              }

              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Integration Tests',
                head_sha: after,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: 'Integration Tests',
                  summary: `Carried forward from ${before}: the newly pushed commits touch inert paths only and Integration Tests passed on the previous head.`
                }
              });
              core.info(`Carried forward success from ${before} to ${after}`);
              core.setOutput('carried', 'true');
            } catch (e) {
              core.warning(`carry-forward errored, falling back to full test run: ${e.message}`);
              core.setOutput('carried', 'false');
            }

  trigger-tests:
    name: Trigger Tests

    runs-on:
      group: databricks-release-runner-group-emu-access
      labels: linux-ubuntu-latest-emu-access

    needs: [check-token, detect-changes, carry-forward]
    if: github.event_name == 'pull_request'
        && needs.check-token.outputs.has_token == 'true'
        && needs.detect-changes.outputs.inert_only == 'false'
        && needs.carry-forward.outputs.carried != 'true'
    environment: "test-trigger-is"

    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

    - name: Generate GitHub App Token for Workflow Trigger
      id: generate-token
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
      with:
        app-id: ${{ secrets.DECO_WORKFLOW_TRIGGER_APP_ID }}
        private-key: ${{ secrets.DECO_WORKFLOW_TRIGGER_PRIVATE_KEY }}
        owner: ${{ secrets.ORG_NAME }}
        repositories: ${{secrets.REPO_NAME}}

    - name: Trigger Workflow in Another Repo
      env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
      run: |
        gh workflow run terraform-isolated-pr.yml -R ${{ secrets.ORG_NAME }}/${{secrets.REPO_NAME}} \
        --ref main \
        -f pull_request_number=${{ github.event.pull_request.number }} \
        -f commit_sha=${{ github.event.pull_request.head.sha }}

  # Inert-path PRs (docs only, etc.) do not warrant a 75-minute integration
  # test run. When detect-changes finds no non-inert files, post a synthetic
  # success for the required "Integration Tests" check directly, mirroring
  # the auto-approve pattern used for merge_group below. The base.ref guard
  # is belt-and-suspenders for the `branches: [main]` filter on the trigger.
  skip-integration-tests:
    name: Skip Integration Tests (inert paths only)

    runs-on:
      group: databricks-deco-testing-runner-group
      labels: ubuntu-latest-deco

    needs: [check-token, detect-changes]
    if: github.event_name == 'pull_request'
        && needs.check-token.outputs.has_token == 'true'
        && needs.detect-changes.outputs.inert_only == 'true'
        && github.event.pull_request.base.ref == 'main'

    permissions:
      checks: write
      contents: read

    steps:
      - name: Post synthetic Integration Tests success
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Integration Tests',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Integration Tests',
                summary: 'Skipped — only inert paths changed (docs/**, root *.md, issue templates, dependabot.yml, CODEOWNERS, LICENSE).'
              }
            });

  # Statuses and checks apply to specific commits (by hash).
  # Enforcement of required checks is done both at the PR level and the merge queue level.
  # In case of multiple commits in a single PR, the hash of the squashed commit
  # will not match the one for the latest (approved) commit in the PR.
  # We auto approve the check for the merge queue for two reasons:
  # * Queue times out due to duration of tests.
  # * Avoid running integration tests twice, since it was already run at the tip of the branch before squashing.
  auto-approve:
    if: github.event_name == 'merge_group'

    runs-on:
      group: databricks-deco-testing-runner-group
      labels: ubuntu-latest-deco

    permissions:
      checks: write
      contents: read

    steps:
      - name: Auto-approve Check for Merge Queue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Integration Tests',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'Integration Tests',
                summary: 'Auto-approved for merge queue (tests already passed on PR)'
              }
            });
