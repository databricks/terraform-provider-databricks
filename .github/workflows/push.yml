name: build

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]

jobs:
  tests:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    permissions:
      # Required for JFrog OIDC auth on same-repo runs. GitHub never issues
      # OIDC tokens to fork PR runs, so the permission is inert there; GitHub
      # offers no way to condition job-level permissions on the event.
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Fork PRs cannot authenticate to JFrog (GitHub does not issue OIDC
      # tokens to fork runs); they resolve modules offline from the cache
      # pre-warmed by the "Warm Go Cache" workflow instead.
      - name: Detect fork PR
        id: fork-check
        shell: bash
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go build environment
        uses: ./.github/actions/setup-go-build-environment
        with:
          go-version-file: go.mod
          is-fork: ${{ steps.fork-check.outputs.is_fork }}

      - name: Pull external libraries
        shell: bash
        env:
          IS_FORK: ${{ steps.fork-check.outputs.is_fork }}
        run: |
          if [ "$IS_FORK" = "true" ]; then
            # Resolve modules offline from the pre-warmed cache. If this fails
            # after a go.mod/go.sum change, a maintainer must run the
            # "Warm Go Cache" workflow with this PR's number first.
            go mod vendor
          else
            jf go mod vendor
          fi

          # Point native go commands at the local module cache instead of
          # the network. go run pkg@version needs module lookups even when
          # cached; file:// satisfies these from disk without network access.
          echo "GOPROXY=file://$(go env GOMODCACHE)/cache/download" >> $GITHUB_ENV
          echo "GONOSUMCHECK=*" >> $GITHUB_ENV
          echo "GONOSUMDB=*" >> $GITHUB_ENV

      - name: Run tests
        shell: bash
        run: |
          # Unset OIDC token env vars injected by the id-token: write permission.
          # The Terraform provider detects these and attempts GitHub OIDC auth,
          # which interferes with the test suite.
          unset ACTIONS_ID_TOKEN_REQUEST_URL
          unset ACTIONS_ID_TOKEN_REQUEST_TOKEN
          make test

      - name: Publish test coverage
        # Fork PRs have no access to CODECOV_TOKEN; skip the upload.
        if: steps.fork-check.outputs.is_fork != 'true'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

          # No need to download cached dependencies when running gofmt.
          cache: false

      - name: Run gofmt
        run: |
          # -l: list files that were reformatted
          # -w: write back formatted files to disk
          gofmt -l -w ./

      - name: Run whitespace validation
        run: make ws

      - name: Fail on differences
        run: |
          # Exit with status code 1 if there are differences (i.e. unformatted files)
          git diff --exit-code
